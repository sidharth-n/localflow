# localflow default config. Copy to ~/.config/localflow/config.yaml to override.

hotkey:
  # pynput key spec. Right Alt is the cleanest default — single key, rarely
  # bound by apps, and the Fn key (macOS-style) isn't catchable on Linux
  # because it's handled in firmware, not the OS.
  # Linux alternatives: <alt_r>, <caps_lock>, <f9>. Mac: <cmd>, <alt_r>.
  key: "<alt_r>"
  # "push_to_talk" (hold) or "toggle" (tap on/off).
  mode: "push_to_talk"

audio:
  sample_rate: 16000
  channels: 1
  # Bytes per audio chunk fed to VAD. 30 ms @ 16 kHz = 480 samples.
  chunk_ms: 30

vad:
  enabled: true
  # probability threshold to consider a chunk speech
  threshold: 0.5
  # trailing silence (ms) to wait before finalizing
  silence_timeout_ms: 400

stt:
  # backend: moonshine_onnx | whisper_cpp | mlx_whisper
  backend: moonshine_onnx
  model: moonshine/base  # tiny | base (small/medium not yet in useful-moonshine-onnx)
  # auto | cuda | cpu | coreml | mlx
  device: auto
  language: en

polish:
  # disable to paste raw transcript
  enabled: true
  # backend: llamacpp | mlx | none
  backend: llamacpp
  model_path: ~/.localflow/models/Qwen3-4B-Instruct-2507-Q4_K_M.gguf
  # tokens to generate max
  max_tokens: 512
  temperature: 0.2
  # llama.cpp GPU offload: -1 = all layers on GPU, 0 = CPU only
  n_gpu_layers: -1
  system_prompt: |
    You clean up raw speech-to-text dictation. Rewrite what the speaker INTENDED,
    not the literal mis-hearing the STT produced.

    Rules:
    - Remove filler words (um, uh, like, you know, so).
    - Add punctuation, capitalization, and sentence breaks.
    - Fix transcription errors from context. Especially technical terms —
      the STT often mis-hears them. Common corrections:
        lump / long / lamp        -> LLM
        jason                     -> JSON
        a p i / api               -> API
        clawed / clod             -> Claude
        chat gpd / jet p t        -> ChatGPT
        get hub                   -> GitHub
        mackbook / mac book       -> MacBook
        python / javascript       -> capitalized properly
    - Preserve the speaker's word choice and meaning. Do NOT rephrase,
      summarize, shorten, or add content.

    Output ONLY the cleaned text. No preamble, no quotes, no explanation.

inject:
  # "clipboard_paste" (universal, default) or "direct" (AXUIElement / xdotool type)
  method: clipboard_paste
  # ms to wait before restoring the previous clipboard contents
  restore_clipboard_after_ms: 500

logging:
  level: INFO
  # write timing/latency metrics to this file. null = no file log.
  metrics_file: ~/.localflow/metrics.jsonl
